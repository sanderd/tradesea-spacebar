name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for commit counting

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build userscript
        run: npx rollup -c

      - name: Determine version for release name
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          MAJOR_MINOR="${TAG#v}"
          COMMITS=$(git rev-list --count "${TAG}..HEAD" 2>/dev/null || echo "0")
          echo "version=${MAJOR_MINOR}.${COMMITS}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.version.outputs.version }}"
          files: dist/tradesea-spacebar.user.js
          generate_release_notes: true
