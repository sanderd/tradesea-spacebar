name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for commit counting

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build userscript
        run: npx rollup -c

      - name: Determine version
        id: version
        run: |
          # Use git describe — same logic as rollup.config.mjs
          DESC=$(git describe --tags --match "v*" --long 2>/dev/null || echo "")
          if [[ "$DESC" =~ ^v([0-9]+\.[0-9]+)-([0-9]+)-g ]]; then
            VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
            TAG="v${BASH_REMATCH[1]}"
          else
            COUNT=$(git rev-list --count HEAD)
            VERSION="0.0.${COUNT}"
            TAG="v0.0"
          fi

          # For tag pushes, use the pushed tag; for manual dispatch, auto-tag
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "v${{ steps.version.outputs.version }}"
          files: dist/tradesea-spacebar.user.js
          generate_release_notes: true
